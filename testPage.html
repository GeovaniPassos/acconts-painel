<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select id="type-select"s>
    <option value="">Selecione</option>
    <option value="card">Cartão</option>
    <option value="cash">Dinheiro</option>
</select>

<!-- Campos para cartão -->
<div class="form-section" style="display: none" data-type="card">
    <input type="text" placeholder="Número do cartão">
    <input type="text" placeholder="Bandeira">
</div>

<!-- Campos para dinheiro -->
<div class="form-section" style="display: none;" data-type="cash">
    <input type="text" placeholder="Local de pagamento">
</div>

    <script>
    

    bindTypeSelector();

    function bindTypeSelector() {
    const select = document.getElementById("type-select");

    if (!select) return;

    select.addEventListener("change", (event) => {
        handleTypeChange(event.target.value);
    });

    }

    function handleTypeChange(selectedType) {
        const sections = document.querySelectorAll(".form-section");

        section.classList.toggle("hidden", type !== selectedType);

        sections.forEach(section => {
            const type = section.dataset.type;

            if (type === selectedType) {
                section.style.display = "block";
            } else {
                section.style.display = "none";
            }
        });
    }
    </script>
</body>
</html>
