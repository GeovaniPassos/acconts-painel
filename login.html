<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="./assets/accounting.png" type="image/x-icon">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container">
        <div class="background"></div>
        
        <div class="login-container">
            <div class="header">
                <div class="logo">
                    <img src="assets/accounting_64px.png" alt="Logo">
                </div>
                <span class="title">Sistema de Controle de Contas</span>
            </div>
            <div class="form-content">
                <div class="login">
                    <h1>Acesse sua conta</h1>
                    <form class="form-login">
                        <input type="text" class="username" placeholder="Usuário">
                        <input type="password" class="password" placeholder="Senha">
                        <button class="button-submit" type="submit">Entrar</button>
                
                        <div class="links">
                            <button class="button-senha">Esqueci minha senha</button>
                            <button class="button-criar">Criar uma conta</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./js/loginMain.js"></script>
</body>
</html>
